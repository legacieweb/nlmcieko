<svg width="300" height="400" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="300" height="400" fill="url(#coverGradient)" rx="12"/>
  
  <rect width="300" height="400" fill="url(#glowGradient)" rx="12"/>

  <g transform="translate(150, 120)">
    <rect x="-40" y="-40" width="80" height="6" fill="white" rx="3"/>
    <rect x="-3" y="-80" width="6" height="160" fill="white" rx="3"/>
  </g>

  <text x="150" y="200" font-family="Arial, sans-serif" font-size="36" font-weight="800" fill="white" text-anchor="middle" dominant-baseline="middle">GOD'S WORD</text>
  
  <text x="150" y="235" font-family="Arial, sans-serif" font-size="16" font-weight="300" fill="white" text-anchor="middle" opacity="0.9">Answers to Life's Deepest Questions</text>

  <g transform="translate(150, 300)">
    <g transform="translate(-80, -20)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="white">✓ Biblical Truth</text>
      <text x="0" y="25" font-family="Arial, sans-serif" font-size="14" fill="white">✓ Verse-by-Verse</text>
      <text x="0" y="50" font-family="Arial, sans-serif" font-size="14" fill="white">✓ Life-Changing</text>
      <text x="0" y="75" font-family="Arial, sans-serif" font-size="14" fill="white">✓ 100% Free</text>
    </g>
  </g>

  <text x="150" y="380" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" opacity="0.8">Discover Your Spiritual Journey</text>

  <rect x="10" y="10" width="280" height="380" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1" rx="8"/>
</svg>