services:
  # Backend API Service
  - type: web
    name: grace-church-api
    env: node
    plan: free
    region: oregon
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NEON_DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://grace-church-website.onrender.com # Update this after frontend is deployed

  # Frontend Static Website
  - type: static
    name: grace-church-website
    env: static
    plan: free
    region: oregon
    rootDir: client
    buildCommand: npm install && npm run build
    publishDir: build
    envVars:
      - key: REACT_APP_SERVER_URL
        value: https://grace-church-api.onrender.com # Update this with your backend URL
